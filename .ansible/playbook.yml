---
- name: Apply post-distribution school updates
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  tasks:

  - name: Update bash welcome message on login
    ansible.builtin.blockinfile:
      path: "/home/max/.bashrc"
      marker: "# {mark} ANSIBLE MANAGED BLOCK (bash welcome message)"
      block: |
        # Print only in non-login shells
        shopt -q login_shell || cat << EOM
        ##############################################################
        # Welcome to Quantum Mobile for the MARVEL-ICTP College 2026!
        # Distributed by the MARVEL NCCR.
        ##############################################################
        EOM

  - name: Install git-lfs
    ansible.builtin.apt:
      name: git-lfs
      state: present
      update_cache: true

  - name: Initialise git-lfs filters for max
    become_user: max
    ansible.builtin.command:
      cmd: git lfs install
    register: lfs_install
    changed_when: "'Updated Git hooks' in lfs_install.stdout or 'Git LFS initialized' in lfs_install.stdout"

  - name: Update `cdd` and `update` shell helpers
    ansible.builtin.blockinfile:
      path: "/home/max/.bashrc"
      marker: "# {mark} ANSIBLE MANAGED BLOCK (materials helpers)"
      block: |
        # day-NN → conda env mapping for the ICTP MARVEL College
        # (day 00 = preliminary exercises in before/preliminary-exercises)
        declare -A _qm_day_env=(
          [00]=qe
          [01]=qe [02]=qe [03]=yambo [04]=wannier [05]=koopmans
          [06]=metatomic [07]=metatomic [08]=metatomic [09]=metatomic [10]=pyece
        )

        # `cdd N` — cd into ~/materials/day-NN-* and activate the matching env.
        # `cdd 0` jumps to the pre-school preliminary exercises instead.
        cdd() {
          if [[ -z "$1" ]]; then
            echo "usage: cdd <day-number>" >&2
            return 1
          fi

          local num
          printf -v num '%02d' "$1"

          local dir
          if [[ "$num" == "00" ]]; then
            dir=$(ls -d "$HOME/materials/before/preliminary-"*/ 2>/dev/null | head -n1)
          else
            dir=$(ls -d "$HOME/materials/day-${num}"*/ 2>/dev/null | head -n1)
          fi

          if [[ -z "$dir" || ! -d "$dir" ]]; then
            echo "❌ No day-${num}* directory under ~/materials" >&2
            return 1
          fi
          cd "$dir" || return 1

          local env="${_qm_day_env[$num]}"
          if [[ -n "$env" ]]; then
            workon "$env"
          fi
        }

        # `update` — pull fresh material from upstream and, if the bundled
        # ansible playbook changed, replay it to apply system updates.
        update() {
          local _qm_origcwd=$PWD
          cd "$HOME/materials" || return 1
          echo "🚀 Updating materials repository..."

          if [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; then
            echo "🔄 Cleaning up stale rebase state from a previous interrupted update..."
            git rebase --abort 2>/dev/null
          fi

          if ! git fetch origin; then
            echo "❌ Update failed to connect to GitHub. Are you offline?" >&2
            cd "$_qm_origcwd" 2>/dev/null
            return 1
          fi

          git add -A
          git commit -m "qm-update wip $(date -Iseconds)" --allow-empty --quiet

          local _qm_rebase_ok=1

          if ! git rebase -X theirs origin/main; then
            _qm_rebase_ok=0
            while [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; do
              local _qm_ud _qm_du
              _qm_ud=$(git status --porcelain | awk '/^UD /{print $2}')
              _qm_du=$(git status --porcelain | awk '/^DU /{print $2}')

              if [[ -z "$_qm_ud" && -z "$_qm_du" ]]; then
                break  # other conflict type we can't auto-resolve
              fi

              # UD: student deleted, upstream modified → reinstate upstream's version
              # DU: student modified, upstream deleted → keep student's modified file
              if [[ -n "$_qm_ud" ]]; then
                echo "$_qm_ud" | xargs git checkout --ours --
                echo "$_qm_ud" | xargs git add
              fi
              [[ -n "$_qm_du" ]] && echo "$_qm_du" | xargs git add

              git rebase --continue || true  # may pause on next conflict
            done
            # Rebase is truly done only when no rebase state dir remains.
            [[ ! -d .git/rebase-merge && ! -d .git/rebase-apply ]] && _qm_rebase_ok=1
          fi
          if [[ $_qm_rebase_ok -eq 0 ]]; then
            git rebase --abort 2>/dev/null
            git reset --soft HEAD~1 --quiet
            git reset --quiet
            echo "❌ Update failed to rebase! Skipped but your work is intact." >&2
            cd "$_qm_origcwd" 2>/dev/null
            return 1
          fi
          git reset --soft HEAD~1 --quiet
          git reset --quiet  # unstage so the working tree looks unchanged

          # Replay bundled playbook if it changed since the last successful run.
          local playbook=$HOME/materials/.ansible/playbook.yml
          if [[ -f "$playbook" ]]; then
            local current_sha
            current_sha=$(git rev-parse HEAD:.ansible 2>/dev/null) || current_sha=""
            local applied_sha=""

            [[ -f $HOME/.qm-update-state ]] && applied_sha=$(<"$HOME/.qm-update-state")

            if [[ -n "$current_sha" && "$current_sha" != "$applied_sha" ]]; then
              echo "🚀 Applying system updates (this may take a moment)..."
              local _qm_ansible_log
              _qm_ansible_log=$(mktemp)

              if (cd "$HOME/materials/.ansible" && \
                  ~/.conda/envs/ansible/bin/ansible-playbook \
                  -i "localhost," -c local playbook.yml) >"$_qm_ansible_log" 2>&1; then
                echo "✅ System updates applied"
                echo "$current_sha" > "$HOME/.qm-update-state"
                rm -f "$_qm_ansible_log"
              else
                cat "$_qm_ansible_log"
                rm -f "$_qm_ansible_log"
                echo "❌ Playbook failed! Please retry on next update." >&2
                cd "$_qm_origcwd" 2>/dev/null
                return 1
              fi
            fi
          fi
          cd "$_qm_origcwd" 2>/dev/null
          echo "✅ Success! All updates complete."
        }

  - name: Check installed qe-tools version in the qe conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/qe/bin/pip show qe-tools
    register: qe_tools_show
    changed_when: false
    failed_when: false

  - name: Install qe-tools 3.0.0a4 (with pint extra) into the qe conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/qe/bin/pip install 'qe-tools[pint]==3.0.0a4'
    when: "'Version: 3.0.0a4' not in qe_tools_show.stdout"
    changed_when: true

  - name: Check installed ase-koopmans version in the koopmans conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/koopmans/bin/pip show ase-koopmans
    register: ase_koopmans_show
    changed_when: false
    failed_when: false

  - name: Install ase-koopmans 0.1.13 into the koopmans conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/koopmans/bin/pip install ase-koopmans==0.1.13
    when: "'Version: 0.1.13' not in ase_koopmans_show.stdout"
    changed_when: true

  - name: Clone/update labcosmo_ictp_school models (main branch only)
    become_user: max
    ansible.builtin.git:
      repo: https://github.com/ppegolo/labcosmo_ictp_school.git
      dest: /home/max/cosmo_models
      version: main
      single_branch: true
      force: true

  - name: Check installed pyscf version in the metatomic conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/metatomic/bin/pip show pyscf
    register: pyscf_show
    changed_when: false
    failed_when: false

  - name: Install pyscf 2.13.1 into the metatomic conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/metatomic/bin/pip install pyscf==2.13.1
    when: "'Version: 2.13.1' not in pyscf_show.stdout"
    changed_when: true

  - name: Create nmr conda env from spec
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/bin/mamba env create -n nmr -f {{ playbook_dir }}/files/nmr-env.yml -y
      creates: /home/max/.conda/envs/nmr/lib/python3.11/site-packages/ipykernel

  - name: Register nmr env as Jupyter kernel
    become_user: max
    ansible.builtin.command:
      cmd: >
        ~/.conda/envs/nmr/bin/python -m ipykernel install --user --name nmr --display-name "Python (nmr)"
      creates: "/home/max/.local/share/jupyter/kernels/nmr/kernel.json"
